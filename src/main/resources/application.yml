spring:
  application:
      name: code-generator-backend
  # session 配置
  session:
    store-type: redis
    #session 30天过期
    timeout: 2592000
  # mysql
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/code_generate
    username: root
    password: 12345678
  # redis
  data:
    redis:
      host: localhost
      port: 6379
      password:
      ttl: 3600 # 缓存过期时间
      database: 0
  profiles:
    active: local
server:
  port: 8123
  servlet:
    #???????/api??
     context-path: /api
     # cookie 30 天过期
     session:
       cookie:
         max-age: 2592000
# springdoc-openapi
springdoc:
  group-configs:
    - group: 'default'
      paths-to-match: '/**'
      packages-to-scan: com.godfan.codegenerate.controller
# knife4j???????????????
knife4j:
  enable: true
  setting:
    language: zh_cn
# 监控
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: always